<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Expense AI — Goals</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070a1f;
  --panel:#0e1230;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.12);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#8b5cf6;
  --accent-2:#6366f1;
  --success:#22c55e;
  --danger:#ef4444;
  --glow:0 20px 50px rgba(139,92,246,.35);
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 20% 20%,rgba(139,92,246,.25),transparent 40%),
    radial-gradient(circle at 80% 0%,rgba(99,102,241,.2),transparent 40%),
    var(--bg);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:linear-gradient(180deg,#0b0f2d,#05081e);
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  border-right:1px solid var(--border);
}

.brand{
  font-size:22px;
  font-weight:700;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.welcome-text {
  font-size: 13px;
  color: #9ca3af;
}

.welcome-name {
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
}

.nav a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 18px;
  border-radius:14px;
  color:var(--muted);
  text-decoration:none;
  transition:.25s;
}

.nav a.active,
.nav a:hover{
  color:#fff;
  background:linear-gradient(
    135deg,
    rgba(139,92,246,.25),
    rgba(99,102,241,.2)
  );
  box-shadow:var(--glow);
}

.logout{
  margin-top:auto;
  padding:14px;
  border-radius:14px;
  background:#ef444426;
  color:#fecaca;
  border:none;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  padding:26px 28px;
  overflow:hidden;
}
body{
  overflow-x:hidden;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:26px;
}
.top-profile{
  position:fixed;
  top:18px;
  right:28px;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;

  z-index:9999;
}

.top-profile img{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #8b5cf6;
  object-fit:cover;
}

.top-profile-label{
  font-size:13px;
  color:white;
}

.topbar h1{
  font-size:26px;
  font-weight:600;
}

/* ===== CARD ===== */
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:26px;
  padding:24px;
  transition:.35s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--glow);
}

/* ===== FORM ===== */
.form{
  display:grid;
  grid-template-columns:1fr 1fr 1fr auto;
  gap:14px;
}

input{
  padding:14px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.6);
  color:#fff;
}

button.primary{
  padding:14px 22px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;
  cursor:pointer;
}

/* ===== GOALS GRID ===== */
.goals{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:28px;
}

.goal-card{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
}

.goal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.goal-card{
  background: linear-gradient(
    135deg,
    rgba(139,92,246,.15),
    rgba(99,102,241,.08)
  );

  border:1px solid rgba(139,92,246,.35);
  border-radius:26px;
  padding:22px;

  backdrop-filter: blur(8px);

  transition: all .4s ease;
}

/* ===== Dynamic Hover Colors ===== */

.goal-card:hover{
  transform: translateY(-10px) scale(1.03);
}

/* GREEN */
.card-green:hover{
  box-shadow:
    0 0 25px rgba(34,197,94,.6),
    0 0 50px rgba(22,163,74,.4);
  border-color: rgba(34,197,94,.6);
}

/* YELLOW */
.card-yellow:hover{
  box-shadow:
    0 0 25px rgba(250,204,21,.6),
    0 0 50px rgba(234,179,8,.4);
  border-color: rgba(250,204,21,.6);
}

/* RED */
.card-red:hover{
  box-shadow:
    0 0 25px rgba(239,68,68,.6),
    0 0 50px rgba(220,38,38,.4);
  border-color: rgba(239,68,68,.6);
}
.goal-card:hover .progress-fill{
  box-shadow:
    0 0 10px rgba(139,92,246,.6),
    0 0 20px rgba(99,102,241,.4);
}
.delete-btn{
  background:none;
  border:none;
  color:var(--danger);
  cursor:pointer;
  font-size:16px;
}

.progress-bar{
  height:16px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
  margin:16px 0;
  position:relative;
}

.progress-fill {
  height:100%;
  border-radius:999px;
  width:0%;
  position:relative;
  overflow:hidden;

  transition: width 1.4s cubic-bezier(.22,1,.36,1);
}

/* animated gradient movement */
.progress-fill::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.35),
    rgba(255,255,255,0.15)
  );
  background-size:200% 100%;
  animation: slide 2.5s linear infinite;
}

@keyframes slide{
  0%{ background-position: 200% 0; }
  100%{ background-position: -200% 0; }
}
/* status colors */
.progress-green{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  box-shadow:0 0 12px rgba(34,197,94,.6);
}

.progress-yellow{
  background:linear-gradient(90deg,#facc15,#eab308);
  box-shadow:0 0 12px rgba(250,204,21,.6);
}

.progress-red{
  background:linear-gradient(90deg,#ef4444,#dc2626);
  box-shadow:0 0 12px rgba(239,68,68,.6);
}
.goal-status.green{color:#22c55e}
.goal-status.yellow{color:#facc15}
.goal-status.red{color:#ef4444}
</style>
</head>

<body>
<div class="top-profile">

  <img id="topProfilePic"
       src="/assets/default-avatar.png">
</div>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
<div class="brand">

  <div class="welcome-text">Welcome</div>

  <div class="welcome-name" id="sidebarUserName">
    User
  </div>

</div>


    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="calculator.html">Calculator</a>
      <a href="financial-assistant.html">Assistant</a>
      <a class="active">Goals</a>
      <a href="notes.html">Notes</a>
      <a href="settings.html">Settings</a>
    </nav>

    <button class="logout" id="logoutBtn">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h1>Goals</h1>
      <div class="status">AI Expense Analyzer</div>
    </div>

    <!-- ADD GOAL -->
    <div class="card">
      <div class="form">
        <input id="goalTitle" placeholder="Goal name">
        <input id="goalAmount" placeholder="Target ₹">
        <input id="goalDue" type="date">
        <button id="setGoalBtn" class="primary">Add</button>
      </div>
    </div>

    <!-- GOALS LIST -->
    <div id="goalsList" class="goals"></div>

  </main>
</div>

<script src="js/goal.js"></script>

<script>
document.getElementById("logoutBtn")?.addEventListener("click", () => {
  localStorage.removeItem("accessToken");
  location.href = "/login.html";
});
</script>

</body>
</html>
