<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Expense AI — Notes</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins, sans-serif;
  background:#070a1f;
  color:#fff;
}

/* ===== TOP PROFILE ===== */
.top-profile{
  position:fixed;
  top:18px;
  right:28px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  z-index:9999;
}

.top-profile img{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #8b5cf6;
}

.top-profile-label{
  font-size:13px;
}

/* ===== APP LAYOUT ===== */
.app{
  display:flex;
  min-height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:linear-gradient(180deg,#0b0f2d,#05081e);
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  min-width:220px;
}

.welcome-text{
  font-size:13px;
  color:#9ca3af;
}

.welcome-name{
  font-size:18px;
  font-weight:600;
}

.nav a{
  display:block;
  padding:12px 14px;
  margin-bottom:8px;
  border-radius:12px;
  color:#c7c9ff;
  text-decoration:none;
}

.nav a:hover,
.nav a.active{
  background:rgba(139,92,246,.25);
}

.logout{
  margin-top:auto;
  padding:14px;
  border-radius:14px;
  background:#ef444426;
  color:#fecaca;
  border:none;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:40px;
  background:radial-gradient(circle at top left,#1a1f55,#070a1f 65%);
}

/* ===== NOTES GRID ===== */

.notes{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:20px;
  margin-top:10px;
}

.notes-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.notes-header h1{
  margin:0;
}

.app-label{
  color:#c7c9ff;
}

/* ===== INPUT ===== */
.note-input{
  display:flex;
  gap:14px;
  margin-bottom:28px;
  align-items:flex-end;
}

textarea{
  flex:1;
  padding:18px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(0,0,0,.5);
  color:white;
  resize:none;
  transition:.2s;
}

textarea:focus{
  outline:none;
  border-color:#8b5cf6;
  box-shadow:0 0 0 3px rgba(139,92,246,.25);
}

.add{
  padding:16px 28px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  color:white;
  cursor:pointer;
  font-weight:500;
  transition:.2s;
}

.add:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(139,92,246,.4);
}
#reminderTime{
  padding:14px;
  border:none;
  border-radius:0;        /* remove rounded shape */
  background:transparent; /* remove dark box */
  color:white;
  outline:none;
  box-shadow:none;
}



.add{
  padding:16px 26px;
  border:none;
  border-radius:14px;
  background:#8b5cf6;
  color:white;
  cursor:pointer;
}

/* ===== NOTES LIST ===== */
.notes{
  display:grid;
  gap:14px;
}

/* ===== NOTE CARD ===== */

.note{
  background:linear-gradient(
    135deg,
    rgba(139,92,246,.15),
    rgba(99,102,241,.08)
  );
  border:1px solid rgba(255,255,255,.08);
  border-radius:22px;
  padding:20px;
  position:relative;
  transition:all .25s ease;
  display:flex;
  flex-direction:column;
  gap:12px;
  min-height:120px;
}

.note:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(139,92,246,.35);
  border-color:rgba(139,92,246,.5);
}
.note-content{
  font-size:15px;
  line-height:1.6;
  word-break:break-word;
  flex:1;
}

.note-footer{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:12px;
  color:#9ca3af;
}

.delete-btn{
  background:transparent;
  border:none;
  color:#9ca3af;
  cursor:pointer;
  font-size:14px;
  transition:.2s;
}

.delete-btn:hover{
  color:#f87171;
}
/* ===== REMINDER INPUT STYLE ===== */

.note-edit{
  margin-top:14px;
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.editReminder{
  max-width:220px;
}
.reminder-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(251,191,36,.15);
  color:#fbbf24;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:500;
}
.editReminder{
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.5);
  color:white;
  font-family:Poppins, sans-serif;
  font-size:13px;
  transition:.2s;
  outline:none;
}

.editReminder:focus{
  border-color:#8b5cf6;
  box-shadow:0 0 0 3px rgba(139,92,246,.25);
}

/* Remove ugly native icon background */
.editReminder::-webkit-calendar-picker-indicator{
  filter:invert(1);
  opacity:.8;
  cursor:pointer;
}

.saveReminder{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  color:white;
  font-size:13px;
  cursor:pointer;
  transition:.2s;
}

.saveReminder:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 18px rgba(139,92,246,.35);
}
</style>
</head>

<body>

<!-- TOP PROFILE (CORRECT LOCATION) -->
<div class="top-profile">

  <img id="topProfilePic"
       src="/assets/default-avatar.png">

  <div class="top-profile-label">
    AI Expense Analyzer
  </div>

</div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div>
      <div class="welcome-text">Welcome</div>
      <div class="welcome-name" id="sidebarUserName">
        User
      </div>
    </div>

    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="calculator.html">Calculator</a>
      <a href="financial-assistant.html">Assistant</a>
      <a href="goal.html">Goals</a>
      <a href="notes.html" class="active">Notes</a>
      <a href="settings.html">Settings</a>
    </nav>

    <button class="logout" onclick="logout()">Logout</button>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="notes-card">

      <div class="notes-header">

        <h1>Notes</h1>
      </div>

      <div class="note-input">

        <textarea
          id="noteText"
          rows="3"
          placeholder="Write something..."></textarea>
        <button
          class="add"
          onclick="addNote()">
          Add
        </button>

      </div>

      <div
        class="notes"
        id="notesList">
      </div>

    </div>

  </main>

</div>

<script src="/js/notes.js"></script>

<script>
function logout(){
  fetch("/api/logout", {
    method:"POST",
    credentials:"include"
  }).finally(()=>{
    location.href="login.html";
  });
}
</script>

</body>
</html>
