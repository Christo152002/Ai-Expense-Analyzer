<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Expense AI — Financial Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070a1f;
  --panel:#0e1230;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.12);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#8b5cf6;
  --accent-2:#6366f1;
  --glow:0 20px 50px rgba(139,92,246,.35);
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 20% 20%,rgba(139,92,246,.25),transparent 40%),
    radial-gradient(circle at 80% 0%,rgba(99,102,241,.2),transparent 40%),
    var(--bg);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}

/* ===== SIDEBAR ===== */
.sidebar{
  background:linear-gradient(180deg,#0b0f2d,#05081e);
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  border-right:1px solid var(--border);
}

.brand{
  font-size:22px;
  font-weight:700;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.welcome-text {
  font-size: 13px;
  color: #9ca3af;
}

.welcome-name {
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
}

.nav a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 18px;
  border-radius:14px;
  color:var(--muted);
  text-decoration:none;
  transition:.25s;
}

.nav a.active,
.nav a:hover{
  color:#fff;
  background:linear-gradient(
    135deg,
    rgba(139,92,246,.25),
    rgba(99,102,241,.2)
  );
  box-shadow:var(--glow);
}

.logout{
  margin-top:auto;
  padding:14px;
  border-radius:14px;
  background:rgba(239,68,68,.15);
  color:#fecaca;
  border:none;
  cursor:pointer;
}

/* ===== MAIN ===== */
.main{
  padding:26px 28px;
  overflow:auto;
}
.top-profile{
  position:fixed;
  top:18px;
  right:28px;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;

  z-index:9999;
}

.top-profile img{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #8b5cf6;
  object-fit:cover;
}

.top-profile-label{
  font-size:13px;
  color:white;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:26px;
}

.topbar h1{
  font-size:26px;
  font-weight:600;
}
/* 3 DOT MENU */

.menu-container{
  position:relative;
}

.menu-btn{
  background:none;
  border:none;
  color:white;
  font-size:22px;
  cursor:pointer;
  padding:6px;
}

.menu-dropdown{

  position:absolute;
  right:0;
  top:35px;

  background:#0e1230;
  border:1px solid rgba(255,255,255,0.1);

  border-radius:10px;

  display:none;

  min-width:140px;

  z-index:9999;

}

.menu-item{

  padding:12px 16px;
  cursor:pointer;

}

.menu-item:hover{

  background:rgba(255,255,255,0.05);

}

/* ===== NEW ASSISTANT HEADER ===== */

.assistant-header{

  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;

}

.assistant-sub{

  color:var(--muted);
  font-size:14px;
  margin-top:4px;

}

/* ===== STATS ===== */

.assistant-stats{

  display:flex;
  gap:16px;

}

.stat-card{

  background:linear-gradient(
    135deg,
    rgba(139,92,246,.15),
    rgba(99,102,241,.1)
  );

  border:1px solid var(--border);

  padding:14px 18px;

  border-radius:14px;

  min-width:120px;

}

.stat-label{

  font-size:12px;
  color:var(--muted);

}

.stat-value{

  font-size:18px;
  font-weight:600;

}
/* STAT CARD HOVER EFFECT */
.stat-card{

  transition: all 0.25s ease;

  cursor:pointer;

}

.stat-card:hover{

  transform: translateY(-6px) scale(1.03);

  background: linear-gradient(
    135deg,
    rgba(139,92,246,.25),
    rgba(99,102,241,.18)
  );

  box-shadow:
    0 12px 30px rgba(139,92,246,.35),
    0 0 15px rgba(99,102,241,.25);

  border-color:
    rgba(139,92,246,.6);

}

/* optional glow animation */
.stat-card:hover .stat-value{

  color:#c4b5fd;

}

/* ===== CHAT CARD ===== */

.assistant-card{

  height:calc(100vh - 160px);

  display:flex;
  flex-direction:column;

}

.messages{

  flex:1;
  overflow-y:auto;
  padding-right:6px;

}

/* ===== MODERN CHAT ===== */

.messages{
  flex:1;
  overflow-y:auto;
  padding:10px 6px 0 6px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* Message Row */
.msg{
  display:flex;
  flex-direction:column;
  max-width:70%;
}
/* User right aligned */
.msg.user{
  margin-left:auto;
  flex-direction:row-reverse;
}

/* Bubble */
.msg-bubble{
  padding:12px 16px;
  border-radius:18px;
  font-size:14px;
  line-height:1.6;
  position:relative;
  animation: fadeIn .25s ease;
}

/* User bubble */
.msg.user .msg-bubble{
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  border-bottom-right-radius:6px;
}

/* Bot bubble */
.msg.bot .msg-bubble{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-bottom-left-radius:6px;
}
/* Wrapper for bubble + time */
.msg-content{
  display:flex;
  flex-direction:column;
  max-width:100%;
}

/* Align user timestamps right */
.msg.user .msg-content{
  align-items:flex-end;
}

/* Prevent overflow */
.msg-bubble{
  word-break:break-word;
  max-width:100%;
}
/* Timestamp */
.msg-time{
  font-size:11px;
  color:#9ca3af;
  margin-top:4px;
}

/* Fade animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}
.typing span{
  animation: blink 1.4s infinite both;
}

.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

@keyframes blink{
  0%{opacity:.2}
  20%{opacity:1}
  100%{opacity:.2}
}
/* ===== CARD ===== */
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:26px;
  padding:24px;
  transition:.35s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:var(--glow);
}

/* ===== CHAT ===== */

.input-row{
  display:flex;
  gap:12px;
}

input{
  flex:1;
  padding:14px 18px;
  border-radius:999px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.6);
  color:#fff;
}

button.send{
  padding:14px 24px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
<div class="brand">

  <div class="welcome-text">Welcome</div>

  <div class="welcome-name" id="sidebarUserName">
    User
  </div>

</div>



    <nav class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="calculator.html">Calculator</a>
      <a class="active">Assistant</a>
      <a href="goal.html">Goals</a>
      <a href="notes.html">Notes</a>
      <a href="settings.html">Settings</a>
    </nav>

    <button class="logout" id="logoutBtn">Logout</button>
  </aside>

  <!-- MAIN -->
<main class="main">

  <!-- HEADER -->
 <div class="assistant-header">

  <div>
    <h1>AI Financial Assistant</h1>
    <div class="assistant-sub">
      Smart analysis, savings advice, and predictions
    </div>
  </div>

  <!-- RIGHT SIDE -->
  <div style="display:flex; align-items:center; gap:16px;">

    <!-- stats -->
    <div class="assistant-stats">

      <div class="stat-card">
        <div class="stat-label">Balance</div>
        <div id="statBalance" class="stat-value">₹0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Spent</div>
        <div id="statSpent" class="stat-value">₹0</div>
      </div>

      <div class="stat-card">
        <div class="stat-label">Savings Rate</div>
        <div id="statSavings" class="stat-value">0%</div>
      </div>

    </div>

    <!-- 3 DOT MENU -->
    <div class="menu-container">

      <button id="menuBtn" class="menu-btn">⋮</button>

      <div id="menuDropdown" class="menu-dropdown">
        <div id="clearChatBtn" class="menu-item">
          Clear Chat
        </div>
      </div>

    </div>

  </div>

</div>

  <!-- CHAT CARD -->
  <div class="card assistant-card">

    <div id="messages" class="messages"></div>

    <div class="input-row">

      <input
        id="userInput"
        placeholder="Ask about savings, balance, predictions..."
      />

      <button id="sendBtn" class="send">
        Send
      </button>

    </div>

  </div>

</main>
<script src="js/financial-assistant.js"></script>

<script>
document.getElementById("logoutBtn")?.addEventListener("click", () => {
  localStorage.removeItem("accessToken");
  location.href = "/login.html";
});
</script>

</body>
</html>
