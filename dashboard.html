<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Expense Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070a1f;
  --panel:#0e1230;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.12);
  --text:#ffffff;
  --muted:#9ca3af;
  --accent:#8b5cf6;
  --accent-2:#6366f1;
  --success:#22c55e;
  --danger:#ef4444;
  --glow:0 20px 50px rgba(139,92,246,.35);
}

*{box-sizing:border-box}

html,body{
  height:100%;
  margin:0;
}

body{
  font-family:'Poppins',sans-serif;
  background:
    radial-gradient(circle at 20% 20%,rgba(139,92,246,.25),transparent 40%),
    radial-gradient(circle at 80% 0%,rgba(99,102,241,.2),transparent 40%),
    var(--bg);
  color:var(--text);
}
/* subtle breathing glow */
@keyframes quoteGlowPulse{

  0%{
    box-shadow:
      0 0 25px rgba(139,92,246,.25),
      0 0 50px rgba(99,102,241,.12);
  }

  50%{
    box-shadow:
      0 0 45px rgba(139,92,246,.55),
      0 0 90px rgba(99,102,241,.25);
  }

  100%{
    box-shadow:
      0 0 25px rgba(139,92,246,.25),
      0 0 50px rgba(99,102,241,.12);
  }

}

.quote-box{
  animation:
    fadeSlide .8s ease,
    quoteGlowPulse 4s ease-in-out infinite;
}
@keyframes iconFloat{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-3px); }
}

.quote-icon{
  animation:iconFloat 3s ease-in-out infinite;
}
/* ================= LAYOUT ================= */
.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  height:100vh;
}
/* ================= GOAL RISK COLORS ================= */
.goal-card.safe {
  border-color: rgba(34,197,94,.6);
  background: linear-gradient(
    180deg,
    rgba(34,197,94,.18),
    rgba(34,197,94,.05)
  );
  box-shadow: 0 0 40px rgba(34,197,94,.35);
}

.goal-card.warning {
  border-color: rgba(234,179,8,.6);
  background: linear-gradient(
    180deg,
    rgba(234,179,8,.18),
    rgba(234,179,8,.05)
  );
  box-shadow: 0 0 40px rgba(234,179,8,.35);
}

.goal-card.danger {
  border-color: rgba(239,68,68,.6);
  background: linear-gradient(
    180deg,
    rgba(239,68,68,.2),
    rgba(239,68,68,.05)
  );
  box-shadow: 0 0 40px rgba(239,68,68,.4);
}
/* SAFE hover */
.goal-card.safe:hover {
  box-shadow:
    0 0 60px rgba(34,197,94,.7),
    0 0 120px rgba(34,197,94,.3);
  transform: translateY(-6px) scale(1.01);
}

/* WARNING hover */
.goal-card.warning:hover {
  box-shadow:
    0 0 60px rgba(234,179,8,.7),
    0 0 120px rgba(234,179,8,.3);
  transform: translateY(-6px) scale(1.01);
}

/* DANGER hover */
.goal-card.danger:hover {
  box-shadow:
    0 0 60px rgba(239,68,68,.8),
    0 0 120px rgba(239,68,68,.35);
  transform: translateY(-6px) scale(1.01);
}

/* Progress container */
.progress {
  width: 100%;
  height: 14px;
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  overflow: hidden;
}

/* Base bar */
#goalProgressBar {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  transition: width .6s ease, background .4s ease, box-shadow .4s ease;
}


/* SAFE → GREEN */
#goalProgressBar.safe {
  background: linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow: 0 0 20px rgba(34,197,94,.7);
}


/* WARNING → YELLOW */
#goalProgressBar.warning {
  background: linear-gradient(135deg,#eab308,#ca8a04);
  box-shadow: 0 0 20px rgba(234,179,8,.7);
}


/* DANGER → RED */
#goalProgressBar.danger {
  background: linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow: 0 0 20px rgba(239,68,68,.7);
}
/* ================= SIDEBAR ================= */
.sidebar{
  background:linear-gradient(180deg,#0b0f2d,#05081e);
  padding:28px 22px;
  display:flex;
  flex-direction:column;
  gap:18px;
  border-right:1px solid var(--border);
}

.brand{
  font-size:22px;
  font-weight:700;
  letter-spacing:.4px;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.welcome-text {
  font-size: 13px;
  color: #9ca3af;
}

.welcome-name {
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
}

.nav a{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 18px;
  border-radius:14px;
  color:var(--muted);
  text-decoration:none;
  transition:.25s;
}

.nav a.active,
.nav a:hover{
  color:white;
  background:linear-gradient(135deg,rgba(139,92,246,.25),rgba(99,102,241,.2));
  box-shadow:var(--glow);
}

.logout{
  margin-top:auto;
  padding:14px;
  border-radius:14px;
  background:rgba(239,68,68,.15);
  color:#fecaca;
  border:none;
  cursor:pointer;
}

/* ================= MAIN ================= */
.main{
  padding:26px 28px;
  overflow:auto;
}

/* ================= TOP BAR ================= */
.topbar{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:20px;
  margin-bottom:26px;
}

.topbar h1{
  font-size:26px;
  font-weight:600;
}

.status{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  padding:0;
}

.status-title{
  font-size:13px;
  color:var(--muted);
}

.status-balance{
  font-size:18px;
  font-weight:600;
  color:#ffffff;
  margin-top:2px;
}
@keyframes glowPulse {

  0%{
    box-shadow:
      0 0 25px rgba(139,92,246,.25),
      0 0 50px rgba(99,102,241,.12);
  }

  50%{
    box-shadow:
      0 0 55px rgba(139,92,246,.6),
      0 0 100px rgba(99,102,241,.35);
  }

  100%{
    box-shadow:
      0 0 25px rgba(139,92,246,.25),
      0 0 50px rgba(99,102,241,.12);
  }

}
/* ================= QUOTES ================= */
.quote-box{
  max-width:520px;
  padding:10px 18px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#e0e7ff;

  background:linear-gradient(
    135deg,
    rgba(139,92,246,.25),
    rgba(99,102,241,.2)
  );

  border:1px solid var(--border);

  animation:
    fadeSlide .8s ease,
    glowPulse 4s ease-in-out infinite;

  transition:
    transform .35s ease,
    background .35s ease;
}
.topbar-quote{
  justify-self:center;
  margin:0;

  animation:
    fadeSlide .8s ease,
    glowPulse 4s ease-in-out infinite;
}
.top-profile{
  position:fixed;
  top:18px;
  right:28px;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;

  z-index:9999;
}

.top-profile img{
  width:36px;
  height:36px;
  border-radius:50%;
  border:2px solid #8b5cf6;
  object-fit:cover;
}

.top-profile-label{
  font-size:13px;
  color:white;
}
/* ================= BUBBLE ANIMATION ================= */

.bubble-card{
position:relative;
overflow:hidden;
}

/* bubble container */
.bubbles{
position:absolute;
bottom:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* individual bubbles */
.bubbles span{

position:absolute;
bottom:-40px;

width:12px;
height:12px;

background:rgba(139,92,246,.4);

border-radius:50%;

animation:bubbleRise 8s infinite linear;

filter:blur(.5px);

}

/* different positions and sizes */

.bubbles span:nth-child(1){
left:10%;
width:8px;
height:8px;
animation-duration:6s;
}

.bubbles span:nth-child(2){
left:25%;
width:14px;
height:14px;
animation-duration:9s;
animation-delay:1s;
}

.bubbles span:nth-child(3){
left:45%;
width:10px;
height:10px;
animation-duration:7s;
animation-delay:2s;
}

.bubbles span:nth-child(4){
left:65%;
width:16px;
height:16px;
animation-duration:10s;
animation-delay:1.5s;
}

.bubbles span:nth-child(5){
left:85%;
width:9px;
height:9px;
animation-duration:8s;
animation-delay:.5s;
}

/* animation */

@keyframes bubbleRise{

0%{
transform:translateY(0) scale(.6);
opacity:0;
}

20%{
opacity:.8;
}

100%{
transform:translateY(-280px) scale(1.4);
opacity:0;
}

}
.goal-card.safe .bubbles span{
background:rgba(34,197,94,.5);
}

.goal-card.warning .bubbles span{
background:rgba(234,179,8,.5);
}

.goal-card.danger .bubbles span{
background:rgba(239,68,68,.5);
}
/* ================= QUOTE HOVER ================= */
.quote-box{
  cursor: default;
  transition:
    transform .35s ease,
    box-shadow .35s ease,
    background .35s ease;
}

.quote-box:hover{
  transform: translateY(-4px) scale(1.02);
  box-shadow:
    0 0 45px rgba(139,92,246,.55),
    0 0 80px rgba(99,102,241,.25);

  background: linear-gradient(
    135deg,
    rgba(139,92,246,.45),
    rgba(99,102,241,.35)
  );
}

.quote-box:hover .quote-icon{
  transform: rotate(-6deg) scale(1.15);
}

.quote-icon{
  transition: transform .35s ease;
}

.quote-icon{
  font-size:16px;
}

@keyframes fadeSlide{
  from{
    opacity:0;
    transform:translateY(-6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:24px;
}

/* ================= CARDS ================= */
.card{
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--border);
  border-radius:26px;
  padding:24px;
  transition:.35s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:var(--glow);
}

.card h3{
  margin:0 0 14px;
  font-weight:600;
}

/* ================= GOAL ================= */
.goal-card{
  grid-column:1 / -1;
  cursor:pointer;
}

.goal-title{
  font-size:18px;
  font-weight:500;
}

.progress{
  height:14px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  overflow:hidden;
  margin:14px 0 8px;
}

.progress div{
  height:100%;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 0 25px rgba(139,92,246,.7);
  transition:width .6s ease;
}

.goal-meta{
  color:var(--muted);
  font-size:13px;
}
.sidebar-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 8px;
}

/* ================= LIST ================= */
.expense-list{
  max-height:220px;
  overflow:auto;
}

.expense{
  padding:10px 0;
  border-bottom:1px dashed rgba(255,255,255,.08);
}
.balance-pill {
  padding: 10px 16px;
  border-radius: 999px;
  background: linear-gradient(
    135deg,
    rgba(139,92,246,.35),
    rgba(99,102,241,.25)
  );
  border: 1px solid var(--border);
  display: inline-flex;
  flex-direction: column;
}

.balance-pill .label {
  font-size: 11px;
  color: var(--muted);
}

.balance-pill .value {
  font-size: 16px;
  font-weight: 600;
}
/* ===== QUOTE TOAST (TOP POPUP) ===== */

.quote-toast{
  position:fixed;
  left:50%;
  top:-80px;                /* start hidden above */
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:#e0e7ff;

  background:linear-gradient(
    135deg,
    rgba(139,92,246,.35),
    rgba(99,102,241,.25)
  );

  border:1px solid var(--border);
  box-shadow:0 0 40px rgba(139,92,246,.45);

  opacity:0;
  transition:
    top .6s ease,
    opacity .6s ease;

  z-index:9999;
}

.quote-toast.show{
  top:82px;                 /* just below topbar */
  opacity:1;
}
.quote-toast{
  backdrop-filter: blur(6px);
}

/* ================= CHART ================= */
canvas{max-height:260px}

/* ================= MOBILE ================= */
@media(max-width:900px){.inline-balance{
  margin-left:10px;
  font-weight:600;
  color:#a78bfa;
}

  .dashboard{grid-template-columns:1fr}
  .sidebar{display:none}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
<div class="brand">

  <div class="welcome-text">Welcome</div>

  <div class="welcome-name" id="sidebarUserName">
    User
  </div>

</div>



    <nav class="nav">
      <a class="active">Dashboard</a>
      <a href="calculator.html">Calculator</a>
      <a href="financial-assistant.html">Assistant</a>
      <a href="goal.html">Goals</a>
      <a href="notes.html">Notes</a>
      <a href="settings.html">Settings</a>
    </nav>

    <button class="logout" id="logoutBtn">Logout</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

<div class="topbar">

  <!-- LEFT -->
  <h1>Overview</h1>

  <!-- CENTER (QUOTE) -->
  <div class="quote-box topbar-quote" id="quoteBox">
    <span class="quote-icon">💡</span>
    <span id="quoteText"></span>
  </div>

  <!-- RIGHT -->
  <div class="status">
    <div class="status-title">AI Expense Analyzer</div>
    <div class="status-balance" id="dashEstimatedBalance">₹0</div>
  </div>

</div>


    <section class="grid">

      <!-- GOAL -->
<div class="card goal-card bubble-card" id="goalCard">

  <div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <h3>Goal Tracking</h3>

  <div class="goal-title" id="goalTitleDash">
    No goals yet
  </div>

  <div class="progress">
    <div id="goalProgressBar"></div>
  </div>

  <div class="goal-meta" id="goalMeta">
    Set a goal to start tracking
  </div>

</div>

      <!-- MONTHLY -->
      <div class="card">
        <h3>Monthly Spending</h3>
        <canvas id="barChart"></canvas>
      </div>
      <!-- CATEGORY -->
      <div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
  <h3>Categories</h3>

  <select id="categoryMonthSelect"
          style="background:#0e1230;color:white;border:1px solid #333;border-radius:8px;padding:4px 8px;">
  </select>
</div>

<canvas id="pieChart"></canvas>
      </div>

    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
